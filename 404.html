<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Auto redirect after 10 seconds -->
    <meta http-equiv="refresh" content="10;url=index.html">
    
    <!-- SEO Meta Tags -->
    <title>Страница не найдена - Причал 45</title>
    <meta name="description" content="Страница не найдена. Вы будете перенаправлены на главную страницу гостиницы Причал 45.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="photos/Эмблема Причал45.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="no-select">
    <!-- Error Page -->
    <section class="error-page">
        <div class="error-page__content">
            <div class="error-page__code">404</div>
            <h1 class="error-page__title">Страница не найдена</h1>
            <p class="error-page__text">
                К сожалению, запрашиваемая страница не существует. 
                Возможно, она была удалена или вы перешли по неверной ссылке.
            </p>
            <a href="index.html" class="btn btn--light btn--large">Вернуться на главную</a>
            <p class="error-page__timer">
                Автоматический переход на главную страницу через <span id="countdown">10</span> секунд...
            </p>
        </div>
    </section>

    <script>
        // Countdown timer
        let seconds = 10;
        const countdownElement = document.getElementById('countdown');
        
        const countdown = setInterval(function() {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
